name: Fix Bootstrap NameError

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fix branch
        uses: actions/checkout@v4
        with:
          ref: fix/axis1-runtime-flow
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt || true

      - name: Run bootstrap tests
        run: |
          python -m unittest tests/test_executor_bootstrap.py -v

      - name: Run axis1 regression tests
        run: |
          python -m unittest tests/test_runtime_flow_axis1.py -v

      - name: Merge fix branch into main
        run: |
          git config user.email "ci@ashbelos.com"
          git config user.name "AshbelOS CI"
          git checkout main
          git merge fix/axis1-runtime-flow --no-ff -m "fix(bootstrap): merge axis1 fix - NameError _handle_set_goal resolved"
          git push origin main

      - name: Trigger Railway deploy
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            https://backboard.railway.app/graphql/v2 \
            -d '{"query":"mutation { deploymentTrigger { deploy } }"}'

      - name: Wait for deploy
        run: sleep 60

      - name: Verify production health
        run: |
          URL="${{ secrets.RAILWAY_URL }}/api/health"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          BODY=$(curl -s "$URL")
          echo "HTTP Status: $STATUS"
          echo "Response: $BODY"
          if [ "$STATUS" != "200" ]; then
            echo "HEALTH CHECK FAILED"
            exit 1
          fi
          echo "PRODUCTION OK"
