name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Write commit hash
        run: echo "${{ github.sha }}" > COMMIT_HASH

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Deploy
        run: |
          railway up --detach \
            --project 55ba9ac0-209d-41c2-a8b6-33ca02b13787 \
            --service 14d47331-de0b-4750-85ac-cb944dd9f754 \
            --environment accc81e8-6278-4005-9bfb-5e76a6a43c32
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Confirm
        run: echo "Deployed ${{ github.sha }}"
