<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>AshbalOS — אשבל אלומיניום</title>
  <link rel="stylesheet" href="/ui/css/app.css?v=p19" />
</head>
<body>

<!-- ── API Key Modal ──────────────────────────────────────────────────── -->
<div class="modal-overlay hidden" id="apiModal">
  <div class="modal">
    <h2>AshbalOS</h2>
    <p style="font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.5px">
      SECURE ACCESS — API KEY REQUIRED
    </p>
    <input class="modal-input" id="apiKeyInput" type="password"
           placeholder="Enter API key..." autocomplete="off" />
    <button class="btn btn-primary" id="apiKeySubmit" style="width:100%">CONNECT</button>
    <label style="display:flex;align-items:center;gap:8px;margin-top:10px;font-size:11px;color:var(--muted);cursor:pointer;user-select:none">
      <input type="checkbox" id="apiRemember" style="cursor:pointer" />
      זכור במכשיר זה
    </label>
    <div class="modal-note">
      ⓘ  Set <code>OS_API_KEY</code> environment variable on Railway.
    </div>
  </div>
</div>

<!-- ── Upload / Import Modal ──────────────────────────────────────────── -->
<div class="modal-overlay hidden" id="uploadModal">
  <div class="um-modal">
    <div class="um-header">
      <div style="font-size:15px;font-weight:700">📂 העלה קובץ / יבוא לידים</div>
      <button class="btn btn-ghost" style="font-size:12px" onclick="UploadModal.close()">✕</button>
    </div>

    <!-- Stage: Drop zone -->
    <div id="umStage-drop">
      <div class="um-dropzone" id="umDropZone">
        <div class="um-dz-icon">📂</div>
        <div class="um-dz-title">גרור קובץ לכאן, או לחץ לבחירה</div>
        <div class="um-dz-sub">Excel, Word, CSV, PDF, TXT · עד 10MB</div>
        <button class="btn btn-primary" style="margin-top:12px">בחר קובץ</button>
        <input type="file" id="umFileInput" accept=".csv,.xlsx,.xls,.docx,.doc,.pdf,.txt" style="display:none" />
      </div>
      <div class="um-drop-error" id="umDropError"></div>
    </div>

    <!-- Stage: Parsing -->
    <div id="umStage-parsing" style="display:none">
      <div class="um-loading-block">
        <div class="um-spinner"></div>
        <div class="um-parsing-title">מנתח קובץ...</div>
        <div class="um-parsing-name" id="umParsingName"></div>
      </div>
    </div>

    <!-- Stage: Review -->
    <div id="umStage-review" style="display:none">
      <div class="um-review-header">
        <div id="umReviewTitle" class="um-review-title">נמצאו רשומות</div>
        <div class="um-review-actions">
          <span class="um-approved-count" id="umApprovedCount">0 אושרו</span>
          <button class="btn btn-ghost" style="font-size:11px" id="umApproveAllBtn">אשר הכל הרלוונטי</button>
          <button class="btn btn-primary" id="umCommitBtn">ייבא אושרו →</button>
        </div>
      </div>
      <div class="um-group-summary" id="umGroupSummary"></div>
      <div class="um-records-container" id="umRecordsContainer"></div>
    </div>

    <!-- Stage: Committing -->
    <div id="umStage-committing" style="display:none">
      <div class="um-loading-block">
        <div class="um-spinner"></div>
        <div id="umCommittingCount" class="um-parsing-title">מייבא...</div>
      </div>
    </div>

    <!-- Stage: Results -->
    <div id="umStage-results" style="display:none">
      <div id="umResultMsg"></div>
      <button class="btn btn-ghost" style="margin-top:12px;width:100%" onclick="UploadModal.close()">סגור</button>
    </div>

  </div>
</div>

<!-- ── Shell ──────────────────────────────────────────────────────────── -->
<div class="os-shell">

  <!-- Header -->
  <header class="header">
    <!-- Mobile hamburger -->
    <button class="sidebar-toggle-btn" id="sidebarToggle" title="תפריט" aria-label="פתח תפריט">☰</button>

    <a class="logo" href="#">
      <div class="logo-hex"></div>
      <span class="logo-name">Ashbal<span>OS</span></span>
    </a>

    <!-- Upload button — visible on all screens -->
    <button class="header-upload-btn" onclick="UploadModal.open()" title="העלה קובץ / יבוא לידים">
      <span>📂</span>
      <span class="header-upload-label">יבוא</span>
    </button>

    <div class="header-meta">
      <!-- Live KPI strip -->
      <div class="header-kpi-group" id="headerKpis" style="display:none">
        <div class="hkpi">
          <span class="hkpi-val hkpi-ils" id="hkPipeline">—</span>
          <span class="hkpi-label">PIPELINE</span>
        </div>
        <div class="hkpi-sep"></div>
        <div class="hkpi">
          <span class="hkpi-val" id="hkDeals">—</span>
          <span class="hkpi-label">DEALS</span>
        </div>
        <div class="hkpi-sep"></div>
        <div class="hkpi">
          <span class="hkpi-val hkpi-good" id="hkHot">—</span>
          <span class="hkpi-label">HOT</span>
        </div>
      </div>

      <div class="header-live">
        <div class="pulse"></div>
        <span style="font-family:var(--mono);font-size:10px;letter-spacing:.5px">LIVE</span>
      </div>
    </div>

    <button class="bell-btn" id="bellBtn">
      <span>⚑</span>
      <span id="bellTxt">אישורים</span>
      <span class="bell-badge hidden" id="bellBadge">0</span>
    </button>
  </header>

  <!-- Mobile sidebar overlay -->
  <div class="sidebar-overlay hidden" id="sidebarOverlay"></div>

  <!-- Sidebar -->
  <nav class="sidebar">
    <div id="sideNav"></div>
  </nav>

  <!-- Main content area -->
  <main class="main">
    <!-- Home (daily work surface) -->
    <div id="panel-home"          class="panel"></div>

    <!-- CRM & Revenue screens -->
    <div id="panel-dashboard"       class="panel"></div>
    <div id="panel-leads"           class="panel"></div>
    <div id="panel-crm"             class="panel"></div>
    <div id="panel-clients"         class="panel"></div>
    <div id="panel-revenue"         class="panel"></div>
    <div id="panel-calendar"        class="panel"></div>
    <div id="panel-briefing"        class="panel"></div>

    <!-- Operations screens -->
    <div id="panel-tasks"           class="panel"></div>
    <div id="panel-communications"  class="panel"></div>
    <div id="panel-approvals"       class="panel"></div>
    <div id="panel-pipeline"        class="panel"></div>

    <!-- System screens -->
    <div id="panel-agents"          class="panel"></div>
    <div id="panel-goals"           class="panel"></div>
    <div id="panel-reports"         class="panel"></div>
    <div id="panel-seo"             class="panel"></div>
    <div id="panel-settings"        class="panel"></div>

    <!-- Lead Acquisition OS -->
    <div id="panel-lead-ops"        class="panel"></div>

    <!-- Legacy screens kept for compatibility -->
    <div id="panel-cmd"             class="panel"></div>
  </main>

</div>

<!-- ── Scripts ────────────────────────────────────────────────────────── -->
<script src="/ui/js/api.js?v=p19"></script>
<script src="/ui/js/components/toast.js?v=p19"></script>
<script src="/ui/js/components/ui.js?v=p19"></script>
<script src="/ui/js/components/upload_modal.js?v=p19"></script>

<!-- Home panel (first) -->
<script src="/ui/js/panels/home.js?v=p19"></script>

<!-- CRM & Revenue panels -->
<script src="/ui/js/panels/dashboard.js?v=p19"></script>
<script src="/ui/js/panels/leads.js?v=p19"></script>
<script src="/ui/js/panels/crm.js?v=p19"></script>
<script src="/ui/js/panels/clients.js?v=p19"></script>
<script src="/ui/js/panels/revenue.js?v=p19"></script>
<script src="/ui/js/panels/calendar.js?v=p19"></script>
<script src="/ui/js/panels/briefing.js?v=p19"></script>

<!-- Operations panels -->
<script src="/ui/js/panels/tasks.js?v=p19"></script>
<script src="/ui/js/panels/communications.js?v=p19"></script>
<script src="/ui/js/panels/approvals.js?v=p19"></script>
<script src="/ui/js/panels/pipeline.js?v=p19"></script>

<!-- System panels -->
<script src="/ui/js/panels/agents.js?v=p19"></script>
<script src="/ui/js/panels/goals.js?v=p19"></script>
<script src="/ui/js/panels/reports.js?v=p19"></script>
<script src="/ui/js/panels/seo.js?v=p19"></script>
<script src="/ui/js/panels/settings.js?v=p19"></script>

<!-- Lead Acquisition OS panel -->
<script src="/ui/js/panels/lead_ops.js?v=p19"></script>

<!-- Legacy panels -->
<script src="/ui/js/panels/command.js?v=p19"></script>

<script src="/ui/js/app.js?v=p19"></script>

</body>
</html>
