<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>AshbalOS — אשבל אלומיניום</title>
  <link rel="stylesheet" href="/ui/css/app.css?v=p12l1" />
</head>
<body>

<!-- ── API Key Modal ──────────────────────────────────────────────────── -->
<div class="modal-overlay hidden" id="apiModal">
  <div class="modal">
    <h2>AshbalOS</h2>
    <p style="font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.5px">
      SECURE ACCESS — API KEY REQUIRED
    </p>
    <input class="modal-input" id="apiKeyInput" type="password"
           placeholder="Enter API key..." autocomplete="off" />
    <button class="btn btn-primary" id="apiKeySubmit" style="width:100%">CONNECT</button>
    <label style="display:flex;align-items:center;gap:8px;margin-top:10px;font-size:11px;color:var(--muted);cursor:pointer;user-select:none">
      <input type="checkbox" id="apiRemember" style="cursor:pointer" />
      זכור במכשיר זה
    </label>
    <div class="modal-note">
      ⓘ  Set <code>OS_API_KEY</code> environment variable on Railway.
    </div>
  </div>
</div>

<!-- ── Shell ──────────────────────────────────────────────────────────── -->
<div class="os-shell">

  <!-- Header -->
  <header class="header">
    <a class="logo" href="#">
      <div class="logo-hex"></div>
      <span class="logo-name">Ashbal<span>OS</span></span>
    </a>

    <div class="header-meta">
      <!-- Live KPI strip -->
      <div class="header-kpi-group" id="headerKpis" style="display:none">
        <div class="hkpi">
          <span class="hkpi-val hkpi-ils" id="hkPipeline">—</span>
          <span class="hkpi-label">PIPELINE</span>
        </div>
        <div class="hkpi-sep"></div>
        <div class="hkpi">
          <span class="hkpi-val" id="hkDeals">—</span>
          <span class="hkpi-label">DEALS</span>
        </div>
        <div class="hkpi-sep"></div>
        <div class="hkpi">
          <span class="hkpi-val hkpi-good" id="hkHot">—</span>
          <span class="hkpi-label">HOT</span>
        </div>
      </div>

      <div class="header-live">
        <div class="pulse"></div>
        <span style="font-family:var(--mono);font-size:10px;letter-spacing:.5px">SYSTEM ONLINE</span>
      </div>
    </div>

    <!-- Lead Ops Status Widget -->
    <div class="lead-ops-widget" id="leadOpsWidget" title="לחץ לפתיחת מרכז לידים" style="display:none">
      <div class="low-chip low-discovered">
        <span class="low-val" id="lowDiscovered">—</span>
        <span class="low-label">גולשים</span>
      </div>
      <div class="low-chip low-inbound">
        <span class="low-val" id="lowInbound">—</span>
        <span class="low-label">נכנסים</span>
      </div>
      <div class="low-chip low-pending">
        <span class="low-val" id="lowPending">—</span>
        <span class="low-label">ממתינים</span>
      </div>
    </div>

    <button class="bell-btn" id="bellBtn">
      <span>⚑</span>
      <span id="bellTxt">APPROVALS</span>
      <span class="bell-badge hidden" id="bellBadge">0</span>
    </button>
  </header>

  <!-- Sidebar -->
  <nav class="sidebar">
    <div id="sideNav"></div>
  </nav>

  <!-- Main content area -->
  <main class="main">
    <!-- CRM & Revenue screens -->
    <div id="panel-dashboard"       class="panel"></div>
    <div id="panel-leads"           class="panel"></div>
    <div id="panel-crm"             class="panel"></div>
    <div id="panel-clients"         class="panel"></div>
    <div id="panel-revenue"         class="panel"></div>
    <div id="panel-calendar"        class="panel"></div>
    <div id="panel-briefing"        class="panel"></div>

    <!-- Operations screens -->
    <div id="panel-tasks"           class="panel"></div>
    <div id="panel-communications"  class="panel"></div>
    <div id="panel-approvals"       class="panel"></div>
    <div id="panel-pipeline"        class="panel"></div>

    <!-- System screens -->
    <div id="panel-agents"          class="panel"></div>
    <div id="panel-goals"           class="panel"></div>
    <div id="panel-reports"         class="panel"></div>
    <div id="panel-seo"             class="panel"></div>
    <div id="panel-settings"        class="panel"></div>

    <!-- Lead Acquisition OS -->
    <div id="panel-lead-ops"        class="panel"></div>

    <!-- Legacy screens kept for compatibility -->
    <div id="panel-cmd"             class="panel"></div>
  </main>

</div>

<!-- ── Scripts ────────────────────────────────────────────────────────── -->
<script src="/ui/js/api.js?v=p12l1"></script>
<script src="/ui/js/components/toast.js?v=p12l1"></script>
<script src="/ui/js/components/ui.js?v=p12l1"></script>

<!-- CRM & Revenue panels -->
<script src="/ui/js/panels/dashboard.js?v=p12l1"></script>
<script src="/ui/js/panels/leads.js?v=p12l1"></script>
<script src="/ui/js/panels/crm.js?v=p12l1"></script>
<script src="/ui/js/panels/clients.js?v=p12l1"></script>
<script src="/ui/js/panels/revenue.js?v=p12l1"></script>
<script src="/ui/js/panels/calendar.js?v=p12l1"></script>
<script src="/ui/js/panels/briefing.js?v=p12l1"></script>

<!-- Operations panels -->
<script src="/ui/js/panels/tasks.js?v=p12l1"></script>
<script src="/ui/js/panels/communications.js?v=p12l1"></script>
<script src="/ui/js/panels/approvals.js?v=p12l1"></script>
<script src="/ui/js/panels/pipeline.js?v=p12l1"></script>

<!-- System panels -->
<script src="/ui/js/panels/agents.js?v=p12l1"></script>
<script src="/ui/js/panels/goals.js?v=p12l1"></script>
<script src="/ui/js/panels/reports.js?v=p12l1"></script>
<script src="/ui/js/panels/seo.js?v=p12l1"></script>
<script src="/ui/js/panels/settings.js?v=p12l1"></script>

<!-- Lead Acquisition OS panel -->
<script src="/ui/js/panels/lead_ops.js?v=p12l1"></script>

<!-- Legacy panels -->
<script src="/ui/js/panels/command.js?v=p12l1"></script>

<script src="/ui/js/app.js?v=p12l1"></script>

</body>
</html>
